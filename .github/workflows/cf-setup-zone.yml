name: CF Zone Setup (One-time)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'setup-zone'
        type: choice
        options:
          - setup-zone
          - get-ns

jobs:
  setup-zone:
    runs-on: ubuntu-latest
    steps:
      - name: Create Zone & Get NS
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Step 1: Create Zone ==="
          ZONE_RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"mcmamoo.com\",\"account\":{\"id\":\"$CF_ACCOUNT_ID\"},\"type\":\"full\"}")
          
          echo "$ZONE_RESULT" | python3 -m json.tool
          
          echo ""
          echo "=== Step 2: Get Zone NS ==="
          ZONE_ID=$(echo "$ZONE_RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('result',{}).get('id','') if d.get('success') else '')" 2>/dev/null)
          
          if [ -z "$ZONE_ID" ]; then
            echo "Zone creation may have failed or zone exists. Trying to find existing zone..."
            ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=mcmamoo.com" \
              -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import json,sys; d=json.load(sys.stdin); zones=d.get('result',[]); print(zones[0]['id'] if zones else '')" 2>/dev/null)
          fi
          
          if [ -n "$ZONE_ID" ]; then
            echo "Zone ID: $ZONE_ID"
            NS_RESULT=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID" \
              -H "Authorization: Bearer $CF_TOKEN")
            echo "$NS_RESULT" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          z = d.get('result',{})
          print(f'Zone: {z.get(\"name\")}')
          print(f'Status: {z.get(\"status\")}')
          print(f'NS: {z.get(\"name_servers\",[])}')
          print(f'Type: {z.get(\"type\")}')
          ns_list = z.get('name_servers',[])
          if ns_list:
              print('=== NS_RECORDS_START ===')
              for ns in ns_list:
                  print(ns)
              print('=== NS_RECORDS_END ===')
          "
          else
            echo "ERROR: Could not find or create zone"
          fi

      - name: Cleanup
        if: always()
        run: echo "Zone setup complete"
