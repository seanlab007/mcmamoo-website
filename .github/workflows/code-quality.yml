name: Code Quality & Security Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 检查 TODO/FIXME 模式
      - name: Check for TODO/FIXME patterns
        run: |
          echo "🔍 Scanning for TODO/FIXME patterns..."
          if grep -r --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            -E "TODO|FIXME" client/src server --exclude-dir=node_modules; then
            echo "❌ ERROR: Found TODO or FIXME comments. Please resolve them before committing."
            exit 1
          else
            echo "✅ No TODO/FIXME patterns found."
          fi

      # 检查受保护文件的修改
      - name: Check protected files
        if: github.event_name == 'pull_request'
        run: |
          echo "🛡️  Checking protected files..."
          PROTECTED_FILES=(
            "client/src/App.tsx"
            "client/src/pages/Home.tsx"
            "server/_core/index.ts"
          )
          
          for file in "${PROTECTED_FILES[@]}"; do
            if git diff origin/main...HEAD --name-only | grep -q "^$file$"; then
              echo "⚠️  WARNING: Protected file '$file' was modified."
              echo "This file should only be modified by authorized maintainers."
              echo "Please ensure this change is intentional and well-documented."
            fi
          done

      # TypeScript 类型检查
      - name: TypeScript type check
        run: pnpm check
        continue-on-error: true

      # ESLint 检查
      - name: Run ESLint
        run: |
          if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ]; then
            pnpm exec eslint client/src --max-warnings 5
          else
            echo "⏭️  ESLint config not found, skipping..."
          fi
        continue-on-error: true

      # 代码格式检查
      - name: Check code formatting
        run: |
          pnpm format --check
        continue-on-error: true

      # 检查导入循环
      - name: Check for circular dependencies
        run: |
          echo "🔄 Checking for circular dependencies..."
          if grep -r --include="*.tsx" --include="*.ts" \
            "from.*\./" client/src | grep -c "from"; then
            echo "ℹ️  Found relative imports. Ensure no circular dependencies."
          fi
        continue-on-error: true

  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 检查依赖安全漏洞
      - name: Check for dependency vulnerabilities
        run: |
          echo "🔐 Checking for security vulnerabilities..."
          pnpm audit --audit-level=moderate || true

      # 检查敏感信息泄露
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

  protected-files-check:
    name: Protected Files Enforcement
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce protected files policy
        run: |
          echo "🔒 Enforcing protected files policy..."
          
          PROTECTED_FILES=(
            "client/src/App.tsx"
            "client/src/pages/Home.tsx"
            "server/_core/index.ts"
            ".github/workflows/code-quality.yml"
          )
          
          MODIFIED_PROTECTED=()
          
          for file in "${PROTECTED_FILES[@]}"; do
            if git diff origin/main...HEAD --name-only | grep -q "^$file$"; then
              MODIFIED_PROTECTED+=("$file")
            fi
          done
          
          if [ ${#MODIFIED_PROTECTED[@]} -gt 0 ]; then
            echo "❌ ERROR: The following protected files were modified:"
            printf '%s\n' "${MODIFIED_PROTECTED[@]}"
            echo ""
            echo "Protected files can only be modified by authorized maintainers."
            echo "If you need to modify these files, please contact the project maintainers."
            exit 1
          else
            echo "✅ No protected files were modified."
          fi

  comment-on-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    needs: [code-quality, build, security]
    
    steps:
      - name: Comment PR with status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.code-quality.result }}' === 'success' ? '✅' : '⚠️';
            const comment = `## Code Quality Check ${status}
            
            - **Code Quality**: ${{ needs.code-quality.result }}
            - **Build**: ${{ needs.build.result }}
            - **Security**: ${{ needs.security.result }}
            
            Please review the workflow logs for details.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
