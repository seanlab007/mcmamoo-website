<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d1a00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3300;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- Outer glow ring -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.3"/>
  <circle cx="512" cy="512" r="400" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
  
  <!-- Star pattern (5-pointed) -->
  <polygon points="512,120 560,350 800,350 614,490 680,720 512,580 344,720 410,490 224,350 464,350" 
           fill="url(#gold)" opacity="0.15"/>
  
  <!-- Central emblem: M character stylized -->
  <text x="512" y="580" 
        font-family="Georgia, serif" 
        font-size="380" 
        font-weight="bold"
        text-anchor="middle"
        fill="url(#gold)">M</text>
  
  <!-- Red star top -->
  <polygon points="512,80 528,135 585,135 540,168 557,223 512,190 467,223 484,168 439,135 496,135" 
           fill="url(#red)"/>
  
  <!-- AI text -->
  <text x="512" y="880" 
        font-family="Arial, sans-serif" 
        font-size="100" 
        font-weight="bold"
        letter-spacing="20"
        text-anchor="middle"
        fill="#FFD700">MaoAI</text>
        
  <!-- Mc&Mamoo subtitle -->
  <text x="512" y="950" 
        font-family="Arial, sans-serif" 
        font-size="42" 
        letter-spacing="5"
        text-anchor="middle"
        fill="#FFA500" opacity="0.8">Mc&amp;Mamoo Growth Engine</text>
</svg>