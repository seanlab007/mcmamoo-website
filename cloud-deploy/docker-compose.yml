version: '3.8'

services:
  # Ollama GPU 服务
  ollama:
    image: ollama/ollama:latest
    container_name: maoai-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
    # GPU 支持（仅 Linux + NVIDIA）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - maoai-net

  # Nginx 反向代理 + 认证
  proxy:
    image: nginx:alpine
    container_name: maoai-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama
    networks:
      - maoai-net
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  maoai-net:
    driver: bridge
