version: '3.8'

services:
  # Qdrant 向量数据库 - Rowboat 知识图谱后端
  qdrant:
    image: qdrant/qdrant:latest
    container_name: maoai-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=32
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rowboat API 服务（可选独立部署）
  rowboat-api:
    build:
      context: .
      dockerfile: Dockerfile.rowboat
    container_name: maoai-rowboat-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=maoai-knowledge-graph
      - PORT=4000
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local

networks:
  default:
    name: maoai-network
