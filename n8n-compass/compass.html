<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2332;
    --border: #2d3a4f;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.25);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    /* 防止渲染期间跳动 */
    scroll-behavior: auto !important;
  }
  /* 隐藏渲染前的空白闪烁 */
  body.loading { visibility: hidden; }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 32px 20px 16px;
    background: linear-gradient(180deg, rgba(59,130,246,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }
  .header .last-updated {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 12px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  /* ===== COMPASS RING ===== */
  .compass-section {
    display: flex;
    justify-content: center;
    padding: 36px 20px 16px;
  }
  .compass-container {
    position: relative;
    width: 320px;
    height: 320px;
  }
  /* Outer glow ring */
  .compass-glow {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      rgba(59,130,246,0.15),
      rgba(167,139,250,0.10),
      rgba(52,211,153,0.08),
      rgba(245,158,11,0.06),
      rgba(239,68,68,0.04),
      rgba(59,130,246,0.15)
    );
    filter: blur(20px);
    /* 移除旋转动画，改为静态渐变 — 消除持续重绘导致的跳闪 */
  }
  
  .compass-ring {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
  }
  /* SVG progress ring */
  .ring-svg {
    position: absolute;
    inset: 8px;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
  }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 18; }
  .ring-progress { fill: none; stroke-width: 18; stroke-linecap: round;
    transition: stroke-dashoffset 1s ease, stroke 0.3s ease; }
  .ring-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-percent {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .ring-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .ring-sublabel { font-size: 11px; color: var(--muted); opacity: 0.7; }

  /* Quarter markers */
  .q-markers { position: absolute; inset: 0; }
  .q-marker {
    position: absolute;
    width: 44px;
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
  }
  .q-marker.active { color: var(--accent); }

  /* Business labels around the compass ring */
  .biz-labels { position: absolute; inset: -20px; pointer-events: none; }
  .biz-label {
    position: absolute;
    font-size: 9.5px;
    font-weight: 600;
    white-space: nowrap;
    padding: 2px 7px;
    border-radius: 8px;
    background: rgba(17,24,39,0.9);
    border: 1px solid var(--border);
    color: #cbd5e1;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
    pointer-events: auto;
    cursor: default;
  }
  .biz-label:hover {
    transform: scale(1.08);
    z-index: 10;
    border-color: rgba(99,102,241,0.4);
  }
  .biz-label .lbl-pct {
    font-weight: 800;
    margin-left: 3px;
  }
  .biz-label .lbl-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ===== PHASE BAR ===== */
  .phase-bar-section { padding: 0 40px 20px; max-width: 900px; margin: 0 auto; }
  .phase-bar {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .phase-step {
    flex: 1;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.3s ease;
    cursor: default;
    position: relative;
  }
  .phase-step.done {
    background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.08));
    border: 1px solid rgba(16,185,129,0.35);
    color: var(--success);
  }
  .phase-step.current {
    background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.08));
    border: 1px solid rgba(59,130,246,0.45);
    color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .phase-step.future {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .phase-arrow { color: var(--muted); font-size: 14px; flex-shrink: 0; }

  /* ===== BUSINESS CARDS GRID ===== */
  .grid-section {
    padding: 16px 32px 48px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px;
  }
  .biz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .biz-card:hover {
    border-color: rgba(59,130,246,0.4);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(59,130,246,0.1);
    transform: translateY(-2px);
  }
  .biz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .biz-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .biz-name { font-size: 17px; font-weight: 700; }
  .biz-emoji { font-size: 22px; margin-right: 8px; vertical-align: middle; }
  .biz-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-core { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
  .badge-growth { background: rgba(52,211,153,0.12); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }
  .badge-infra { background: rgba(99,102,241,0.13); color: #818cf8; border: 1px solid rgba(99,102,241,0.25); }
  .badge-revenue { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }

  .biz-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
  }

  /* Objective */
  .objective {
    background: var(--surface);
    border-radius: 9px;
    padding: 12px 14px;
    margin-bottom: 12px;
    border-left: 3px solid var(--accent);
  }
  .obj-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #cbd5e1;
  }
  .kr-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .kr-row:last-child { margin-bottom: 0; }
  .kr-text {
    font-size: 11.5px;
    color: var(--muted);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .kr-bar-wrap { flex: 0 0 72px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .kr-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .kr-pct { font-size: 10px; font-weight: 600; flex: 0 0 30px; text-align: right; }

  /* Card summary bar */
  .card-summary { display: flex; gap: 10px; margin-top: 12px; }
  .summary-stat {

    text-align: center;
    padding: 8px 6px;
    border-radius: 8px;
    background: var(--surface);
    font-size: 10px;
  }
  .summary-val { font-size: 16px; font-weight: 800; display: block; }
  .summary-lbl { color: var(--muted); margin-top: 2px; }

  /* Color classes for bars */
  .c-blue { background: var(--accent); }
  .c-green { background: var(--success); }
  .c-yellow { background: var(--warning); }
  .c-red { background: var(--danger); }
  .c-purple { background: #a78bfa; }
  .c-cyan { background: #22d3ee; }
  .c-orange { background: #fb923c; }

  /* Card accent colors per business */
  .biz-card[data-biz="maoai"]::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .biz-card[data-biz="dmb"]::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
  .biz-card[data-biz="mintqx"]::before { background: linear-gradient(90deg, #10b981, #34d399); }
  .biz-card[data-biz="usdd"]::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .biz-card[data-biz="daiizen"]::before { background: linear-gradient(90deg, #ec4899, #f472b6); }
  .biz-card[data-biz="maoyan"]::before { background: linear-gradient(90deg, #ef4444, #f87171); }
  .biz-card[data-biz="content"]::before { background: linear-gradient(90deg, #06b6d4, #22d3ee); }

  /* ===== OVERVIEW SUMMARY (总任务概览) ===== */

    padding: 20px 32px 30px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .overview-header {
    font-size: 16px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .overview-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
  }
  .overview-card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-1px); }
  .ov-emoji { font-size: 22px; margin-bottom: 4px; }
  .ov-name {
    font-size: 11.5px;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 6px;
  }
  .ov-pct {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.1;
  }
  .ov-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 7px;
  }
  .ov-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .ov-detail {
    font-size: 9px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  /* ===== WORKBUDDY TASKS PANEL ===== */
  .wb-section {
    padding: 20px 32px 40px;
    max-width: 1100px;
    margin: 0 auto;

    align-items: center;

    margin-bottom: 16px;

  .wb-title {

    font-weight: 700;
    color: #e2e8f0;

    align-items: center;

    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(99,102,241,0.15);
    color: #818cf8;
    border: 1px solid rgba(99,102,241,0.25);
    font-weight: 600;
  }
  .wb-grid {

    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));

    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .wb-task:hover { border-color: rgba(99,102,241,0.35); }
  .wb-task::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 11px 0 0 11px;
  }

  .wb-task[data-status="completed"]::before { background: var(--success); }
  .wb-task[data-status="stuck"]::before { background: var(--danger); }
  .wb-task[data-status="pending"]::before { background: var(--muted); }

    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .wb-status-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 1px;
  }
  .status-running { background: rgba(59,130,246,0.15); color: var(--accent); }
  .status-completed { background: rgba(16,185,129,0.15); color: var(--success); }
  .status-stuck { background: rgba(239,68,68,0.15); color: var(--danger); }
  .status-pending { background: rgba(100,116,139,0.15); color: var(--muted); }

  .wb-task-title {
    font-size: 13px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;

    font-size: 11.5px;

    margin-top: 3px;

    font-weight: 800;

  .wb-time {
    font-size: 9.5px;
    color: var(--muted);

  }
  .wb-mini-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .wb-mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Responsive */
  @media (max-width: 720px) {
    .compass-container { width: 260px; height: 260px; }
    .ring-percent { font-size: 38px; }
    .grid-section { padding: 16px 16px 40px; grid-template-columns: 1fr; }
    .phase-bar-section { padding: 0 16px 16px; }
  }
</style>

// ============================================================
// 🎨 RENDER ENGINE
// ============================================================

const KR_COLORS = ["c-blue", "c-green", "c-yellow", "c-red", "c-purple", "c-cyan", "c-orange"];

function getProgressColor(pct) {
  if (pct >= 80) return "#10b981";
  if (pct >= 50) return "#3b82f6";
  if (pct >= 25) return "#f59e0b";
  return "#ef4444";
}

function renderCompassRing() {
  const businesses = OKR_DATA.businesses;
  let totalPct = 0;
  let totalKRs = 0, completedKRs = 0;
  businesses.forEach(b => {
    totalPct += b.overallProgress;
    if (b.stats) { totalKRs += b.stats.krs || 0; completedKRs += b.stats.completedKRs || 0; }
  });
  totalPct = Math.round(totalPct / businesses.length);

  document.getElementById("totalPercent").textContent = totalPct + "%";
  document.getElementById("quarterLabel").textContent = OKR_DATA.meta.currentQuarter + " 进行中";

  // Formula hint: explain how the number is calculated
  const formulaEl = document.getElementById("formulaHint");
  const krRate = totalKRs > 0 ? Math.round(completedKRs / totalKRs * 100) : 0;
  formulaEl.textContent = `${businesses.length} 板块均 · ${totalKRs} KR · ${completedKRs} 完成 (${krRate}%)`;

  // Draw quarter segments on the SVG ring
  const g = document.getElementById("ringSegments");
  const cx = 80, cy = 80, r = 68;
  const circumference = 2 * Math.PI * r;

  businesses.forEach((biz, i) => {
    const startAngle = (i / businesses.length) * 360 - 90;
    const endAngle = ((i + 1) / businesses.length) * 360 - 90;
    const gap = 3; // degrees
    const pct = biz.overallProgress / 100;

    const startRad = ((startAngle + gap) * Math.PI) / 180;
    const endRadBase = ((endAngle - gap) * Math.PI) / 180;
    const endRad = startRad + (endRadBase - startRad) * pct;

    const x1 = cx + r * Math.cos(startRad);
    const y1 = cy + r * Math.sin(startRad);
    const x2 = cx + r * Math.cos(endRad);
    const y2 = cy + r * Math.sin(endRad);
    
    // Background arc (full segment, faint)
    const xBgEnd = cx + r * Math.cos(endRadBase);
    const yBgEnd = cy + r * Math.sin(endRadBase);
    const largeArcBg = endRadBase - startRad > Math.PI ? 1 : 0;

    const bgArc = document.createElementNS("http://www.w3.org/2000/svg", "path");
    bgArc.setAttribute("d", `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArcBg} 1 ${xBgEnd} ${yBgEnd} Z`);
    bgArc.setAttribute("fill", "rgba(45,58,79,0.5)");
    bgArc.setAttribute("stroke", "none");
    g.appendChild(bgArc);

    // Progress arc (colored portion)
    if (pct > 0.02) {
      const largeArc = endRad - startRad > Math.PI ? 1 : 0;
      const arc = document.createElementNS("http://www.w3.org/2000/svg", "path");
      arc.setAttribute("d", `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`);
      arc.setAttribute("fill", getProgressColor(biz.overallProgress));
      arc.setAttribute("opacity", "0.85");
      g.appendChild(arc);
    }
  });

  // ── Render business labels around the ring ──
  const labelsContainer = document.getElementById("bizLabels");
  labelsContainer.innerHTML = "";
  const containerSize = 320; // matches .compass-container width
  const labelRadius = containerSize / 2 + 18; // just outside the ring

  businesses.forEach((biz, i) => {
    const midAngle = ((i + 0.5) / businesses.length) * 360 - 90;
    const midRad = (midAngle * Math.PI) / 180;

    const lx = containerSize / 2 + labelRadius * Math.cos(midRad);
    const ly = containerSize / 2 + labelRadius * Math.sin(midRad);

    const label = document.createElement("div");
    label.className = "biz-label";
    const dotColor = getProgressColor(biz.overallProgress);

    // Position: center on the point
    label.style.left = lx + "px";
    label.style.top = ly + "px";
    label.style.transform = "translate(-50%, -50%)";

    label.innerHTML = `<span class="lbl-dot" style="background:${dotColor}"></span>${biz.emoji} <span class="lbl-pct" style="color:${dotColor}">${biz.overallProgress}%</span>`;

    labelsContainer.appendChild(label);
  });
}

function renderPhaseBar() {
  const container = document.getElementById("phaseBar");
  container.innerHTML = "";
  OKR_DATA.meta.phases.forEach((phase, i) => {
    const step = document.createElement("div");
    step.className = `phase-step ${phase.status}`;
    step.innerHTML = `<strong>${phase.name}</strong><br><small>${phase.desc}</small>`;
    container.appendChild(step);
    if (i < OKR_DATA.meta.phases.length - 1) {
      const arrow = document.createElement("span");
      arrow.className = "phase-arrow";
      arrow.textContent = "▸";
      container.appendChild(arrow);
    }
  });
}

    let objectivesHtml = "";
    biz.objectives.forEach((obj, oi) => {
      let krRows = "";

        krRows += `
          <div class="kr-row">
            <span class="kr-text">${kr.text}</span>
            <div class="kr-bar-wrap"><div class="kr-bar ${colorCls}" style="width:${kr.progress}%"></div></div>
            <span class="kr-pct" style="color:${getProgressColor(kr.progress)}">${kr.progress}%</span>
          </div>`;
      });

      objectivesHtml += `
        <div class="objective">
          <div class="obj-title">${obj.title}</div>
          ${krRows}

    });

    card.innerHTML = `
      <div class="biz-header">
        <div><span class="biz-emoji">${biz.emoji}</span><span class="biz-name">${biz.name}</span></div>
        <span class="biz-badge ${biz.badge.cls}">${biz.badge.text}</span>

        </div>
        <div class="summary-stat">

        <div class="summary-stat">

}

    if (biz.objectives) {
      biz.objectives.forEach(o => {
        if (o.keyResults) o.keyResults.forEach(kr => { krTotal++; if (kr.progress >= 100) krDone++; });
      });
    }

    card.innerHTML = `
      <div class="ov-emoji">${biz.emoji}</div>
      <div class="ov-name">${biz.name}</div>
      <div class="ov-pct" style="color:${pctColor}">${biz.overallProgress}%</div>
      <div class="ov-bar-wrap"><div class="ov-bar-fill" style="width:${biz.overallProgress}%;background:${pctColor}"></div></div>
      <div class="ov-detail">${krDone}/${krTotal} KR 完成 · ${biz.stats ? biz.stats.okrs : 0} 目标</div>
    `;

    grid.appendChild(card);
  });
}

// ============================================================
// 🤖 WORKBUDDY TASKS PANEL
// ============================================================
function formatAgo(isoStr) {
  if (!isoStr) return "--";
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "刚刚";
  if (mins < 60) return mins + "分钟前";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "小时前";
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + "天前";
  return Math.floor(days / 30) + "月前";
}

function renderWorkbuddyTasks() {
  const grid = document.getElementById("wbTaskGrid");
  const countEl = document.getElementById("wbCount");
  const tasks = OKR_DATA.workbuddyTasks || [];

  // Sort: running > stuck > completed > pending
  const statusOrder = { running: 0, stuck: 1, pending: 2, completed: 3 };
  tasks.sort((a, b) => (statusOrder[a.status] || 99) - (statusOrder[b.status] || 99));

  countEl.textContent = tasks.length + " 个任务";

  grid.innerHTML = "";
  tasks.forEach(task => {
    const el = document.createElement("div");
    el.className = "wb-task";
    el.dataset.status = task.status;

    // Status icon
    let icon, statusCls;
    switch (task.status) {
      case "running":   icon = "▶"; statusCls = "status-running"; break;
      case "completed": icon = "✓"; statusCls = "status-completed"; break;
      case "stuck":     icon = "⛔"; statusCls = "status-stuck"; break;
      default:          icon = "○"; statusCls = "status-pending"; break;
    }

    const pctColor = getProgressColor(task.progress);

    el.innerHTML = `
      <div class="wb-status-icon ${statusCls}">${icon}</div>
      <div class="wb-info">
        <div class="wb-task-title">${task.title}</div>
        <div class="wb-task-step">
          ${task.step || ""}
        </div>
        <div class="wb-mini-bar"><div class="wb-mini-bar-fill" style="width:${task.progress}%;background:${pctColor}"></div></div>
      </div>
      <div class="wb-progress-wrap">
        <span class="wb-pct" style="color:${pctColor}">${task.progress}%</span>
        <span class="wb-time">${formatAgo(task.updatedAt)}</span>
      </div>`;

    grid.appendChild(el);
  });

  // Hide section if no tasks
  const section = document.getElementById("wbSection");
  section.style.display = tasks.length === 0 ? "none" : "";
}

// ============================================================
// 🔧 INIT — 防跳闪：先锁定滚动 → 渲染 → 解锁
// ============================================================
(function init() {
  // 1. 锁定当前滚动位置
  var scrollY = window.scrollY || window.pageYOffset || 0;
  
  // 2. 允许 n8n 注入数据覆盖
  if (window.__OKR_INJECTED__) {
    Object.assign(OKR_DATA, window.__OKR_INJECTED__);
  }

  // 3. 执行所有渲染（DOM 操作期间不可见）
  setUpdateTime();
  renderCompassRing();
  renderPhaseBar();
  renderOverview();
  renderBusinessCards();
  renderWorkbuddyTasks();

  // 4. 渲染完成，恢复滚动位置 + 移除 loading 状态
  requestAnimationFrame(function() {
    window.scrollTo(0, scrollY);
    document.body.classList.remove('loading');
  });
})();
