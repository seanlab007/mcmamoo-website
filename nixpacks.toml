[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@10.4.1", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm exec esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist"]

[start]
cmd = "node dist/index.js"
